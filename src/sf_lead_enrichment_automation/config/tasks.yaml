---
scan_for_new_leads_in_salesforce:
  agent: lead_ingestion_agent
  description: |
    Scan Salesforce for leads with status `New` that are ready for enrichment.

    This task identifies incoming leads from the Lixil Salesforce environment and prepares 
    a single lead record for downstream enrichment. It extracts all available lead fields 
    relevant to the Crew AI enrichment workflow. The system should query Salesforce for 
    leads with `Lead Status = New`, and return a maximum of one record for testing.

    For each lead found:
    - Extract the following fields:
        - Name
        - Title
        - Email
        - Phone Number
        - Role
        - Industry
        - Company Name
        - Company Address
        - Website
        - Lead Source Site
        - Annual Revenue
        - Annual Number of Homes
        - Score

    - Any missing or unpopulated fields should be returned explicitly with a `null` value.
    - The structured output should preserve the expected schema so it can be passed directly to the next enrichment agent.
    
    - IMPORTANT: ONLY ATTEMPT 1 RECORD AT THIS TIME. 

  expected_output: |
    A structured JSON array containing a single lead object with status `New`.

    Each object includes:
    - `lead_id`: the Salesforce ID for the lead
    - All 13 lead fields as defined above
    - Fields that are empty in Salesforce are returned as `null`

    The response should begin with a count message:
    "Found 1 lead with status 'New'"


enrich_missing_lead_fields:
  agent: lead_enrichment_agent
  description: |
    For each lead record received with status `New`, identify and enrich any missing fields using online research.

    Use the following fields from the input JSON:
      - Name
      - Title
      - Email
      - Phone Number
      - Role
      - Industry
      - Company Name
      - Company Address
      - Website
      - Lead Source Site
      - Annual Revenue
      - Annual Number of Homes
      - Score

    Only enrich fields that are `null` or missing. Do not overwrite populated fields unless explicitly instructed.

    Prioritize personal data enrichment first (e.g., Role, Industry, Title), followed by company-level details (e.g., Website, Revenue, Company Address).

    Use tools such as SERPR API and browser search to retrieve data. Validate across multiple sources where possible.

  expected_output: |
    A structured JSON object representing the enriched lead, with:
    - Original lead fields preserved
    - Missing fields populated with new data
    - A `data_sources` map showing URLs or sources used per enriched field
    - A `confidence_score` or enrichment status per field

    Fields not enriched remain `null`.
    This enriched lead object will be passed to the next agent for validation.


validate_enriched_lead_data:
  agent: qa_data_verification_agent
  description: |
    Review enriched lead records and verify the accuracy of each populated field.

    Cross-reference enriched values against source data and look for inconsistencies, 
    mismatches, or signs of low-confidence enrichment. For each enriched field:
    - Confirm whether the value is valid and aligns with external data.
    - Assign a quality or confidence score.
    - Flag fields that appear unreliable or conflict with verified sources.

    Ensure all required fields are populated and valid before allowing the record to proceed to the update stage.

  expected_output: |
    A structured JSON object representing the validated lead, including:
    - All enriched fields with their final values
    - A `validation_score` or `status` per field
    - A list of any fields flagged for review or correction

    This validated record will be passed to the update agent.


update_leads_and_mark_as_reviewed:
  agent: salesforce_integration_agent
  description: |
    Update Salesforce with validated enriched lead data.

    For each lead:
    - Only update fields that are currently empty.
    - Never overwrite the `Name` field.
    - Set the `crew_enrichment__c` field to the current datetime.
    - Change `Lead_Status__c` from `New` to `Reviewed`.

    Use the following write-back strategy:
    - Standard fields that can be updated directly:
        - Title
        - Email
        - Phone Number
        - Industry
        - Website
    - Custom fields that must be passed via `additionalFields`:
        - Role__c
        - Annual_Revenue__c
        - Annual_Number_of_Homes__c
        - Company_Address__c
        - Lead_Source_Site__c
        - Score__c
        - crew_enrichment__c
        - Lead_Status__c

    Implement full error handling, rollback if necessary, and create an audit log for each update. Ensure that enriched data never overwrites valid existing data unless explicitly allowed.

  expected_output: |
    A structured report per processed lead containing:
    - List of fields updated and their new values
    - List of fields preserved (especially Name)
    - Confirmation that `Lead_Status__c` was changed to `Reviewed`
    - Timestamp recorded in `crew_enrichment__c`
    - Any errors or exceptions encountered
    - Before/after comparison snapshot of the lead


