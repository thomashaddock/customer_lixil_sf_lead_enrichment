---
scan_for_new_leads_in_salesforce:
  agent: lead_ingestion_agent
  description: |
    Search Salesforce for all leads with Lead Status = ''New'' that need
    processing. Use the salesforce_search_records_lead tool with SOQL query: 
    SELECT Id, Name, Email, State, Phone, Lead_Status__c, CreatedDate, Owner.Alias, 
    Company, Company_Size__c, Annual_Revenue__c, Industry, Website, Title, Lead_Score__c, crew_enrichment__c 
    FROM Lead WHERE Lead_Status__c = ''New''. 
    LIMIT 1;

    Limit the number of leads to 1 for testing purposes.
    
    Extract all available field data and 
    identify which fields are empty and need enrichment. IMPORTANT: Count the number of leads found 
    and print a message like "Found X leads with status New" at the beginning of your response. 
    Return structured data with lead IDs for downstream processing.
  expected_output: |
    A structured JSON list of leads with status ''New'' from Salesforce,
    containing all available field data: Id, Name, State, Phone, Email, Lead_Status__c, 
    CreatedDate, Owner.Alias, Company, Company_Size__c, Annual_Revenue__c, Industry, 
    Website, Title, Lead_Score__c, crew_enrichment__c. Include lead IDs and identify which fields are empty 
    and need enrichment. Start your response with a count message like "Found X leads with status New".

